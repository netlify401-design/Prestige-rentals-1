<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prestige Rentals | Luxury Fleet</title>
    <style>
        /* Base styles */
        body { background-color: #0b0c10; color: #fff; font-family: sans-serif; margin: 0; }
        
        /* Hero Section */
        .hero { text-align: center; padding: 60px 20px; background: linear-gradient(135deg, #1f2833, #0b0c10); }
        .hero h1 { font-size: 3rem; color: #45f3ff; margin-bottom: 10px; }
        .hero-image { width: 100%; max-width: 800px; border-radius: 15px; margin: 20px 0; border: 2px solid #45f3ff; }

        /* Contact Section */
        .contact-section { padding: 50px 20px; max-width: 600px; margin: 0 auto; background: #1f2833; border-radius: 12px; }
        .contact-section h2 { color: #45f3ff; text-align: center; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border-radius: 5px; border: none; }
        .submit-btn { width: 100%; padding: 12px; background: #45f3ff; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }

        /* (Keep your existing styles for the fleet grid here...) */
    </style>
</head>
<body>

    <section class="hero">
        <h1>Experience True Luxury</h1>
        <p>Premium vehicles, yachts, and helicopter tours across Australia.</p>
        <img src="https://via.placeholder.com/800x400" alt="Luxury Fleet" class="hero-image">
    </section>

    <div id="tabsBox"></div>
    <div id="fleetBox"></div>

    <section class="contact-section">
        <h2>Contact Us</h2>
        <form action="https://api.staticforms.dev/submit" method="post">
            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea name="message" rows="4" required></textarea>
            </div>
            <button type="submit" class="submit-btn">Send Inquiry</button>
        </form>
    </section>

    <script>
        // ... (Your fleet script remains the same)
    </script>
</body>
</html>
